services:
  mysql:
    image: mysql:8.4
    container_name: mp-ftms-mysql
    environment:
      MYSQL_DATABASE: mp_ftms
      MYSQL_USER: ftms_user
      MYSQL_PASSWORD: ftms_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    container_name: mp-ftms-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: mp-ftms-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mp-ftms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ./backend
    container_name: mp-ftms-backend
    depends_on:
      - mysql
      - mongo
      - redis
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      DB_URL: jdbc:mysql://mysql:3306/mp_ftms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ftms_user
      DB_PASSWORD: ftms_password
      MONGO_URI: mongodb://mongo:27017/mp_ftms_logs
      REDIS_HOST: redis
      SPRING_CACHE_TYPE: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: change-this-secret-in-prod-minimum-64-bytes-for-hmac-sha-signing
      DEMO_SEED_ENABLED: "true"
      CORS_ORIGINS: http://localhost:8081,http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: mp-ftms-frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: mp-ftms-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "8081:80"
    volumes:
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
  mongo-data:
  redis-data:
