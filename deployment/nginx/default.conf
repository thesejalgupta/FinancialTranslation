upstream ftms_frontend {
  server frontend:80;
}

upstream ftms_backend {
  server backend:8080;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 20m;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'" always;

  location /api/ {
    proxy_pass http://ftms_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /v3/ {
    proxy_pass http://ftms_backend;
    proxy_set_header Host $host;
  }

  location /swagger-ui/ {
    proxy_pass http://ftms_backend;
    proxy_set_header Host $host;
  }

  location /swagger-ui.html {
    proxy_pass http://ftms_backend;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://ftms_frontend;
    proxy_set_header Host $host;
  }
}

