server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: mp-ftms
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/mp_ftms;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=VALUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        type:
          preferred_uuid_jdbc_type: VARCHAR
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false
  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    issuer: mp-government-ftms
    secret: ${JWT_SECRET:mp-ftms-demo-secret-change-this-in-production-64-bytes}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5000,http://localhost:5173,http://localhost:4173,https://${REPLIT_DEV_DOMAIN:localhost}}
  demo:
    seed-enabled: ${DEMO_SEED_ENABLED:true}
